<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">LiftMaster service badge</title>
  <desc id="desc">Custom SVG badge for LiftMaster systems serviced by Springs Garage Door Services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b10"/>
      <stop offset="100%" stop-color="#151b25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d61d17"/>
      <stop offset="100%" stop-color="#ff9a4f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.92" cy="0.08" r="1.05">
      <stop offset="0%" stop-color="#d61d17" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#d61d17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" rx="28" fill="url(#bg)"/>
  <rect width="320" height="180" rx="28" fill="url(#glow)"/>
  <rect x="12" y="12" width="296" height="156" rx="22" fill="#0f141c" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M34 42H286" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <g opacity="0.12" stroke="#ffffff" stroke-linecap="round">
    <path d="M220 116H276"/>
    <path d="M220 128H276"/>
    <path d="M220 140H276"/>
  </g>
  <g transform="translate(34 62)">
    <rect width="68" height="68" rx="18" fill="#131a24" stroke="url(#accent)" stroke-opacity="0.45"/>
    <rect x="8" y="8" width="52" height="52" rx="14" fill="url(#accent)" opacity="0.16"/>
    <text x="34" y="44" text-anchor="middle" font-family="'Segoe UI', 'Trebuchet MS', sans-serif" font-size="26" font-weight="700" fill="#f7f3e8" letter-spacing="1.2">LM</text>
  </g>
  <rect x="124" y="56" width="100" height="16" rx="8" fill="#131a24" stroke="url(#accent)" stroke-opacity="0.28"/>
  <text x="174" y="67" text-anchor="middle" font-family="'Segoe UI', 'Trebuchet MS', sans-serif" font-size="8.4" font-weight="700" letter-spacing="1.4" fill="#ffde7f">BRAND WE SERVICE</text>
  <g font-family="'Segoe UI', 'Trebuchet MS', sans-serif">
    <text x="124" y="91" font-size="14" font-weight="700" letter-spacing="1.3" fill="#f7f3e8" textLength="156" lengthAdjust="spacingAndGlyphs">LIFTMASTER</text>
    <text x="124" y="112" font-size="10.6" font-weight="600" letter-spacing="1.1" fill="#d4d0c7" textLength="156" lengthAdjust="spacingAndGlyphs">SMART OPENER SYSTEMS</text>
    <text x="124" y="141" font-size="10" font-weight="700" letter-spacing="1.4" fill="#f6bf2a" textLength="156" lengthAdjust="spacingAndGlyphs">SERVICE REPAIR SETUP</text>
  </g>
</svg>